<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#0099CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066AA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="neuronGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFE5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B8D4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Brain Outline - Left Hemisphere -->
  <path d="M 120 200
           Q 110 180, 110 160
           Q 110 140, 120 125
           Q 130 110, 145 105
           Q 160 100, 175 105
           L 185 110
           Q 190 115, 192 122
           L 195 135
           Q 196 145, 195 155
           L 193 170
           Q 190 185, 185 195
           L 180 205
           Q 175 215, 168 225
           L 160 235
           Q 150 245, 140 250
           L 130 253
           Q 120 254, 113 248
           L 108 240
           Q 105 230, 107 220
           L 112 208
           Q 115 203, 120 200 Z"
        stroke="url(#brainGradient)"
        stroke-width="3"
        fill="none"
        filter="url(#glow)"/>
  
  <!-- Brain Outline - Right Hemisphere -->
  <path d="M 280 200
           Q 290 180, 290 160
           Q 290 140, 280 125
           Q 270 110, 255 105
           Q 240 100, 225 105
           L 215 110
           Q 210 115, 208 122
           L 205 135
           Q 204 145, 205 155
           L 207 170
           Q 210 185, 215 195
           L 220 205
           Q 225 215, 232 225
           L 240 235
           Q 250 245, 260 250
           L 270 253
           Q 280 254, 287 248
           L 292 240
           Q 295 230, 293 220
           L 288 208
           Q 285 203, 280 200 Z"
        stroke="url(#brainGradient)"
        stroke-width="3"
        fill="none"
        filter="url(#glow)"/>
  
  <!-- Neural Network Nodes -->
  <circle cx="150" cy="140" r="8" fill="url(#neuronGradient)" opacity="0.9">
    <animate attributeName="r" values="8;11;8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="160" r="7" fill="url(#neuronGradient)" opacity="0.9">
    <animate attributeName="r" values="7;10;7" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="145" cy="190" r="6" fill="url(#neuronGradient)" opacity="0.9">
    <animate attributeName="r" values="6;9;6" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="210" r="7" fill="url(#neuronGradient)" opacity="0.9">
    <animate attributeName="r" values="7;10;7" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="250" cy="140" r="8" fill="url(#neuronGradient)" opacity="0.9">
    <animate attributeName="r" values="8;11;8" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="220" cy="160" r="7" fill="url(#neuronGradient)" opacity="0.9">
    <animate attributeName="r" values="7;10;7" dur="2.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="255" cy="190" r="6" fill="url(#neuronGradient)" opacity="0.9">
    <animate attributeName="r" values="6;9;6" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="230" cy="210" r="7" fill="url(#neuronGradient)" opacity="0.9">
    <animate attributeName="r" values="7;10;7" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Center Connection Node -->
  <circle cx="200" cy="180" r="10" fill="#00FFE5" opacity="0.95" filter="url(#glow)">
    <animate attributeName="r" values="10;14;10" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Neural Connections -->
  <line x1="150" y1="140" x2="180" y2="160" stroke="#00D4FF" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <line x1="180" y1="160" x2="200" y2="180" stroke="#00D4FF" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.7s" repeatCount="indefinite"/>
  </line>
  <line x1="145" y1="190" x2="170" y2="210" stroke="#00D4FF" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.9s" repeatCount="indefinite"/>
  </line>
  <line x1="170" y1="210" x2="200" y2="180" stroke="#00D4FF" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.1s" repeatCount="indefinite"/>
  </line>
  
  <line x1="250" y1="140" x2="220" y2="160" stroke="#00D4FF" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.6s" repeatCount="indefinite"/>
  </line>
  <line x1="220" y1="160" x2="200" y2="180" stroke="#00D4FF" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.8s" repeatCount="indefinite"/>
  </line>
  <line x1="255" y1="190" x2="230" y2="210" stroke="#00D4FF" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="230" y1="210" x2="200" y2="180" stroke="#00D4FF" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.2s" repeatCount="indefinite"/>
  </line>
  
  <!-- Digital Data Particles -->
  <circle cx="130" cy="120" r="3" fill="#00FFE5" opacity="0.8">
    <animate attributeName="cy" from="120" to="260" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="270" cy="120" r="3" fill="#00FFE5" opacity="0.8">
    <animate attributeName="cy" from="120" to="260" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="100" r="3" fill="#00FFE5" opacity="0.8">
    <animate attributeName="cy" from="100" to="270" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Circuit Pattern -->
  <path d="M 110 280 L 140 280 L 140 300 L 160 300" stroke="#0099CC" stroke-width="2" opacity="0.5" fill="none"/>
  <path d="M 290 280 L 260 280 L 260 300 L 240 300" stroke="#0099CC" stroke-width="2" opacity="0.5" fill="none"/>
  <rect x="135" y="295" width="10" height="10" fill="#0099CC" opacity="0.6"/>
  <rect x="255" y="295" width="10" height="10" fill="#0099CC" opacity="0.6"/>
  
  <!-- Binary Code Effect -->
  <text x="90" y="320" font-family="monospace" font-size="12" fill="#00D4FF" opacity="0.4">01</text>
  <text x="310" y="320" font-family="monospace" font-size="12" fill="#00D4FF" opacity="0.4">10</text>
  <text x="185" y="90" font-family="monospace" font-size="12" fill="#00D4FF" opacity="0.4">11</text>
</svg>
